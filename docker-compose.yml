services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: shoeler_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shoeler_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: shoeler
      MYSQL_PASSWORD: shoeler123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - shoeler_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shoeler_app
    restart: no
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: shoeler_db
      DB_USERNAME: shoeler
      DB_PASSWORD: shoeler123
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shoeler_network
    command: >
      sh -c "
        if [ ! -f .env ]; then cp .env.example .env; fi &&
        if [ ! -f /tmp/app-initialized ]; then
          composer install --no-interaction --optimize-autoloader &&
          php artisan key:generate --force &&
          php artisan config:clear &&
          php artisan storage:link --force &&
          php artisan migrate --force &&
          php artisan db:seed --force &&
          touch /tmp/app-initialized
        fi &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  # phpMyAdmin (Optional - for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: shoeler_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: shoeler
      PMA_PASSWORD: shoeler123
    depends_on:
      - mysql
    networks:
      - shoeler_network

networks:
  shoeler_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
