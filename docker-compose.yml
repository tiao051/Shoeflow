version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: shoeler_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shoeler_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: shoeler
      MYSQL_PASSWORD: shoeler123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - shoeler_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: shoeler_app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: shoeler_db
      DB_USERNAME: shoeler
      DB_PASSWORD: shoeler123
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shoeler_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: shoeler_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: shoeler
      PMA_PASSWORD: shoeler123
    depends_on:
      - mysql
    networks:
      - shoeler_network

networks:
  shoeler_network:
    driver: bridge

volumes:
  mysql_data:
